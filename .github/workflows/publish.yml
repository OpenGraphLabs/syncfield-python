name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node (for viewer frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build viewer frontend
        working-directory: src/syncfield/viewer/frontend
        run: |
          # Use npm install rather than npm ci to sidestep the rollup
          # cross-platform optional-deps bug
          # (https://github.com/npm/cli/issues/4828) when a macOS-generated
          # lockfile is installed on Linux runners.
          npm install --no-audit --no-fund
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        run: python -m build --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
